<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Road - horizontal -->
  <rect x="0" y="24" width="64" height="16" fill="#1c1c2e" rx="0"/>
  <!-- Road - vertical -->
  <rect x="24" y="0" width="16" height="64" fill="#1c1c2e" rx="0"/>

  <!-- Intersection center -->
  <rect x="24" y="24" width="16" height="16" fill="#252538"/>

  <!-- Road markings - horizontal dashes -->
  <rect x="2"  y="31" width="6" height="2" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="12" y="31" width="6" height="2" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="46" y="31" width="6" height="2" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="56" y="31" width="6" height="2" rx="1" fill="#ffffff" opacity="0.35"/>

  <!-- Road markings - vertical dashes -->
  <rect x="31" y="2"  width="2" height="6" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="31" y="12" width="2" height="6" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="31" y="46" width="2" height="6" rx="1" fill="#ffffff" opacity="0.35"/>
  <rect x="31" y="56" width="2" height="6" rx="1" fill="#ffffff" opacity="0.35"/>

  <!-- Traffic light housing -->
  <rect x="28.5" y="26.5" width="7" height="11" rx="2" fill="#111122"/>

  <!-- Red light -->
  <circle cx="32" cy="29" r="1.8" fill="#ff4757" filter="url(#glow)" opacity="0.9"/>
  <!-- Amber light (off) -->
  <circle cx="32" cy="32" r="1.8" fill="#3a2a00" opacity="0.7"/>
  <!-- Green light -->
  <circle cx="32" cy="35" r="1.8" fill="#2ed573" filter="url(#glow)" opacity="0.9"/>

  <!-- Tiny car - horizontal road, going right -->
  <rect x="6" y="26.5" width="7" height="4" rx="1.2" fill="#4a9eff" opacity="0.9" filter="url(#softglow)"/>
  <!-- Tiny car - vertical road, going down -->
  <rect x="26.5" y="52" width="4" height="7" rx="1.2" fill="#ff6b9d" opacity="0.9" filter="url(#softglow)"/>
</svg>
